# Example: front sipplane pods with Call-ID affinity (RFC 0001).
#
# HAProxy does not parse SIP natively. For production prefer a SIP-aware
# dispatcher, or terminate TCP and hash on a header extracted by a custom
# Lua/SPOE — or run Envoy with an external processor.
#
# Below: TCP mode sketch using stick-table on source IP as a *lab* fallback
# (NOT Call-ID). Replace with SIP-aware LB for real affinity.
#
# listen sipplane_tcp
#   bind *:5060
#   mode tcp
#   balance roundrobin
#   stick-table type ip size 100k expire 30m
#   stick on src
#   server sp1 10.0.1.11:5060 check
#   server sp2 10.0.1.12:5060 check
#
# Recommended production pattern:
#   1. Redis shared location on all sipplane pods (SIPPLANE_REDIS_ADDR).
#   2. SIP-aware LB hashes Call-ID → pod.
#   3. Inside each pod, Route loadBalance algorithm: consistent_hash for trunks.
#
# See docs/cluster.md

frontend fe_sip_tcp
  bind *:5060
  mode tcp
  default_backend be_sipplane

backend be_sipplane
  mode tcp
  balance roundrobin
  option tcp-check
  server sp1 10.0.1.11:5060 check
  server sp2 10.0.1.12:5060 check
