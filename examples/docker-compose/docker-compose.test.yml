services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sipplane
      POSTGRES_PASSWORD: sipplane
      POSTGRES_DB: sipplane
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sipplane -d sipplane"]
      interval: 2s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 20
