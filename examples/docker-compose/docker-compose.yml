services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sipplane
      POSTGRES_PASSWORD: sipplane
      POSTGRES_DB: sipplane
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sipplane"]
      interval: 3s
      timeout: 3s
      retries: 10

  sipplane:
    build:
      context: ../..
      dockerfile: Dockerfile
    ports:
      - "5060:5060/udp"
      - "5060:5060/tcp"
      - "8080:8080"
    environment:
      SIPPLANE_ADVERTISED_HOST: "127.0.0.1"
      SIPPLANE_LOG_LEVEL: info
    volumes:
      - ../config:/etc/sipplane:ro
