{{- if and .Values.networkPolicy.enabled .Values.controlPlane.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "sipplane.fullname" . }}-control
  labels:
    {{- include "sipplane.labels" . | nindent 4 }}
    app.kubernetes.io/component: control-plane
spec:
  podSelector:
    matchLabels:
      {{- include "sipplane.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: control-plane
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Only same-namespace pods (data plane + operators via port-forward / internal)
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 8090
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    {{- if .Values.networkPolicy.restrictEgress }}
    - ports:
        - protocol: TCP
          port: 5432
    {{- else }}
    - {}
    {{- end }}
{{- end }}
