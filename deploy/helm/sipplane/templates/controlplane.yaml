{{- if .Values.controlPlane.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sipplane.fullname" . }}-control
  labels:
    {{- include "sipplane.labels" . | nindent 4 }}
    app.kubernetes.io/component: control-plane
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "sipplane.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: control-plane
  template:
    metadata:
      labels:
        {{- include "sipplane.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: control-plane
    spec:
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: sipplane-control
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["sipplane-control"]
          args:
            - -listen={{ .Values.controlPlane.listen }}
            {{- if .Values.controlPlane.databaseUrl }}
            - -database-url={{ .Values.controlPlane.databaseUrl }}
            {{- end }}
            {{- if .Values.controlPlane.seed }}
            - -seed={{ .Values.controlPlane.seed }}
            {{- end }}
          env:
            {{- if .Values.controlToken }}
            - name: SIPPLANE_CONTROL_TOKEN
              value: {{ .Values.controlToken | quote }}
            {{- else if .Values.controlPlane.authToken }}
            - name: SIPPLANE_CONTROL_TOKEN
              value: {{ .Values.controlPlane.authToken | quote }}
            {{- end }}
          ports:
            - name: http
              containerPort: 8090
          {{- with .Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
          resources:
            {{- toYaml .Values.controlPlane.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "sipplane.fullname" . }}-control
  labels:
    {{- include "sipplane.labels" . | nindent 4 }}
    app.kubernetes.io/component: control-plane
spec:
  type: ClusterIP
  selector:
    {{- include "sipplane.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: control-plane
  ports:
    - name: http
      port: 8090
      targetPort: http
{{- end }}
