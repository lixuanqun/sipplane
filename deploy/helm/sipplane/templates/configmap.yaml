apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "sipplane.fullname" . }}-config
  labels:
    {{- include "sipplane.labels" . | nindent 4 }}
data:
  bootstrap.yaml: |
    listen: "0.0.0.0:{{ .Values.service.sipPort }}"
    transport: {{ .Values.config.transport }}
    advertised_host: {{ required "advertisedHost is required" .Values.advertisedHost | quote }}
    advertised_port: {{ .Values.advertisedPort }}
    http_listen: "0.0.0.0:{{ .Values.service.httpPort }}"
    config_dir: /etc/sipplane
    realm: {{ .Values.config.realm | quote }}
    enable_path: {{ .Values.config.enablePath }}
    enable_outbound: {{ .Values.config.enableOutbound | default false }}
    redirect_policy: {{ .Values.config.redirectPolicy | default "passthrough" | quote }}
    {{- if .Values.config.hepAddr }}
    hep_addr: {{ .Values.config.hepAddr | quote }}
    hep_capture_id: {{ .Values.config.hepCaptureId | default 2001 }}
    {{- end }}
    {{- if .Values.config.redisAddr }}
    redis_addr: {{ .Values.config.redisAddr | quote }}
    {{- end }}
    {{- if .Values.config.controlUrl }}
    control_url: {{ .Values.config.controlUrl | quote }}
    {{- end }}
    {{- if .Values.config.otelEndpoint }}
    otel_endpoint: {{ .Values.config.otelEndpoint | quote }}
    {{- end }}
    {{- if .Values.config.controlToken }}
    control_token: {{ .Values.config.controlToken | quote }}
    {{- else if .Values.controlToken }}
    control_token: {{ .Values.controlToken | quote }}
    {{- end }}
    {{- if or .Values.policies.acl .Values.policies.rateLimit }}
    policies:
      {{- with .Values.policies.acl }}
      acl:
        {{- if .denyCidrs }}
        denyCidrs:
          {{- toYaml .denyCidrs | nindent 10 }}
        {{- end }}
        {{- if .allowCidrs }}
        allowCidrs:
          {{- toYaml .allowCidrs | nindent 10 }}
        {{- end }}
        {{- if .methods }}
        methods:
          {{- toYaml .methods | nindent 10 }}
        {{- end }}
      {{- end }}
      {{- with .Values.policies.rateLimit }}
      rateLimit:
        cps: {{ .cps }}
        burst: {{ .burst | default 0 }}
        {{- if .backend }}
        backend: {{ .backend | quote }}
        {{- end }}
        {{- if .key }}
        key: {{ .key | quote }}
        {{- end }}
      {{- end }}
    {{- end }}
    log_level: info
  lab.yaml: |
    apiVersion: sipplane.io/v1alpha1
    kind: Tenant
    metadata:
      name: default
    spec:
      displayName: default
    ---
    apiVersion: sipplane.io/v1alpha1
    kind: Route
    metadata:
      name: ua-to-ua
      tenant: default
    spec:
      priority: 100
      match:
        methods: ["INVITE", "BYE", "CANCEL", "ACK", "OPTIONS"]
      action:
        type: registerLookup
